name: Android APK validation

on:
  pull_request:
    paths:
      - "apk/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/android-apk-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out sources and OCR models
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run local logic tests
        shell: pwsh
        run: ./apk/run-local-tests.ps1

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :apk:app:assembleDebug --stacktrace

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: shiqi-food-expiry-v0.3.13-debug
          path: apk/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
